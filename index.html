  { id: 6, name: "Ժողովրդավարական համախմբում", logo: "https://upload.wikimedia.org/wikipedia/commons/0/0c/DCP.2021.jpg" },

  { id: 12, name: "Հայ ազգային կոնգրես", logo: "https://upload.wikimedia.org/wikipedia/commons/5/5b/Anc_logo.PNG" },

  { id: 18, name: "Քոչարի ազգային վերածնունդ և ազգի զարթոնք", logo: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLggbEGwu3AVgQn6Cx4xXmf4UYur61rayTeA&s" },
  { id: 19, name: "Հանուն Հանրապետության...", logo: "https://upload.wikimedia.org/wikipedia/commons/1/1f/%D5%80%D5%A1%D5%B6%D5%B8%D6%82%D5%B6.png" }

// ===== LOGO CACHE =====
const logoCache = {};

function getLogo(id) {
  if (logoCache[id]) return logoCache[id];

  const party = parties.find(p => p.id == id);

  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = party?.logo || "";

  img.onerror = () => {
    img.src = "https://via.placeholder.com/100?text=?";
  };

  logoCache[id] = img;
  return img;
}

// ===== LOGO PLUGIN =====
const logoPlugin = {
  id: 'logoPlugin',
  afterDatasetsDraw(chart) {
    const { ctx } = chart;
    const dataset = chart.getDatasetMeta(0);

    dataset.data.forEach((bar, index) => {
      const id = chart.data.labels[index];
      const img = getLogo(id);

      if (!img.complete) return;

      const width = bar.width;
      const height = width;

      const x = bar.x - width / 2;
      const y = bar.y - height - 10;

      ctx.drawImage(img, x, y, width, height);
    });
  }
};

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "parlo1-28056.firebaseapp.com",
  databaseURL: "https://parlo1-28056-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const VERSION = "3333";

// ===== STATE =====
let display = "LIST";
let cache = null;
let currentScope = { type: "ALL" };
let barChart;

// ===== COLORS =====
function getColorByPartyId(id) {
  const palette = ["#FFA726","#66BB6A","#42A5F5","#AB47BC","#FF7043","#26C6DA","#D4E157","#8D6E63","#EC407A","#78909C"];
  return palette[(id - 1) % palette.length];
}

// ===== LIVE =====
function startLiveUpdates() {
  db.ref("votes/" + VERSION).on("value", (snap) => {
    cache = snap.val() || {};
    refreshCurrentView();
  });
}

// ===== VIEW =====
function refreshCurrentView() {
  if (!cache) return;
  calculateAll();
}

// ===== CALC =====
function calculateAll() {
  const totals = new Array(20).fill(0);

  for (let r in cache) {
    for (let s in cache[r]) {
      const parties = cache[r][s].parties || {};
      for (let p in parties) totals[p] += parties[p];
    }
  }

  renderAll(totals);
}

// ===== RENDER =====
function renderAll(totals) {
  let rows = [];

  for (let i = 1; i <= 19; i++) {
    rows.push({ id: i, votes: totals[i] });
  }

  rows.sort((a,b)=>b.votes-a.votes);

  renderChart(rows);
}

// ===== CHART =====
function renderChart(rows) {
  const labels = rows.map(r => r.id);
  const data = rows.map(r => r.votes);
  const colors = rows.map(r => getColorByPartyId(r.id));

  if (barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors
      }]
    },
    options: {
      layout: {
        padding: { top: 90 }
      },
      plugins: {
        legend: { display: false },
        datalabels: {
          anchor: 'end',
          align: 'top',
          offset: 40,
          color: '#111',
          font: { weight: 'bold', size: 12 },
          formatter: function(value, ctx) {
            const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            const percent = total ? ((value / total) * 100).toFixed(1) : 0;
            return value + " (" + percent + "%)";
          }
        }
      }
    },
    plugins: [ChartDataLabels, logoPlugin]
  });
}

// ===== START =====
startLiveUpdates();

</script>
