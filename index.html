<!DOCTYPE html>
<html>
<head>
  <title>Votes Admin</title>

  <style>
    html, body {
      height: 100%;
      margin: 0;
      font-family: Arial;
    }

    body {
      display: flex;
      flex-direction: column;
      padding: 20px;
      box-sizing: border-box;
    }

    #controls {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    #grid button {
      width: 80px;
      margin: 4px;
    }

    .hidden {
      display: none;
    }

    /* ===== CHART FULL HEIGHT ===== */
    #chartWrap {
      flex: 1;
      display: flex;
      align-items: flex-end;
      gap: 12px;
      padding: 10px;
    }

    .partyCol {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      width: 70px;
      height: 100%;
      font-size: 12px;
    }

    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      margin: 5px 0;
      transition: height 0.3s ease;
    }

    .logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<h2 id="title">Votes</h2>

<div id="controls">
  <button onclick="setMode('ALL')">ALL</button>
  <button onclick="setMode('TOP')">TOP</button>
  <button onclick="setDisplay('LIST')">LIST</button>
  <button onclick="setDisplay('CHART')">CHART</button>
</div>

<hr>

<div id="grid"></div>
<div id="list"></div>
<div id="chartWrap" class="hidden"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "parlo1-28056.firebaseapp.com",
  databaseURL: "https://parlo1-28056-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const VERSION = "3333";

// ===== PARTIES (use your local files like "2.png") =====
const parties = [
  { id:1, short:"ՔՊ", logo:"1.png"},
  { id:2, short:"ԲՀԿ", logo:"2.png"},
  { id:3, short:"ՀՇ", logo:"3.png"},
  { id:4, short:"Դեմ", logo:"4.png"},
  { id:5, short:"Ուժեղ", logo:"5.png"},
  { id:6, short:"ԺՀԿ", logo:"6.png"},
  { id:7, short:"Միասն.", logo:"7.png"},
  { id:8, short:"ԼՀԿ", logo:"8.png"},
  { id:9, short:"ԱԺԲ", logo:"9.png"},
  { id:10, short:"Հայաստան", logo:"10.png"},
  { id:11, short:"Քրիստ.", logo:"11.png"},
  { id:12, short:"ՀԱԿ", logo:"12.png"},
  { id:13, short:"ՆորՈւժ", logo:"13.png"},
  { id:14, short:"Հանր.", logo:"14.png"},
  { id:15, short:"Ալյանս", logo:"15.png"},
  { id:16, short:"Ռեֆորմ", logo:"16.png"},
  { id:17, short:"ԴՕԿ", logo:"17.png"},
  { id:18, short:"Քոչ.", logo:"18.png"},
  { id:19, short:"Հանուն", logo:"19.png"}
];

// ===== STATE =====
let display = "LIST";
let selectedTopN = null;
let cache = null;

// ===== COLORS =====
function getColorByPartyId(id) {
  const palette = ["#FFA726","#66BB6A","#42A5F5","#AB47BC","#FF7043","#26C6DA","#D4E157","#8D6E63","#EC407A","#78909C"];
  return palette[(id - 1) % palette.length];
}

// ===== LIVE =====
db.ref("votes/" + VERSION).on("value", (snap) => {
  cache = snap.val() || {};
  calculateAll();
});

// ===== DISPLAY =====
function setDisplay(d) {
  display = d;
  document.getElementById("list").classList.add("hidden");
  document.getElementById("chartWrap").classList.add("hidden");

  if (d === "LIST") document.getElementById("list").classList.remove("hidden");
  if (d === "CHART") document.getElementById("chartWrap").classList.remove("hidden");
}

// ===== DATA =====
function calculateAll() {
  if (!cache) return;

  const totals = new Array(20).fill(0);

  for (let r in cache) {
    for (let s in cache[r]) {
      const p = cache[r][s].parties || {};
      for (let i in p) totals[i] += p[i];
    }
  }

  renderAll(totals);
}

// ===== TOP =====
function setMode(m) {
  if (m === "TOP") {
    renderGrid(Array.from({length:19},(_,i)=>i+1), n => {
      selectedTopN = n;
      calculateAll();
    });
  }
  if (m === "ALL") {
    selectedTopN = null;
    calculateAll();
  }
}

// ===== GRID =====
function renderGrid(items, onClick) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(i => {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => onClick(i);
    grid.appendChild(btn);
  });
}

// ===== RENDER =====
function renderAll(totals) {
  let rows = [];

  for (let i = 1; i <= 19; i++) {
    rows.push({ id: i, votes: totals[i] });
  }

  rows.sort((a,b)=>b.votes-a.votes);

  if (selectedTopN) rows = rows.slice(0, selectedTopN);

  renderList(rows);
  renderChart(rows);
}

// ===== LIST =====
function renderList(rows) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  rows.forEach(r => {
    const div = document.createElement("div");
    div.innerText = `Party ${r.id}: ${r.votes}`;
    list.appendChild(div);
  });
}

// ===== CHART =====
function renderChart(rows) {
  const wrap = document.getElementById("chartWrap");
  wrap.innerHTML = "";

  const total = rows.reduce((a,b)=>a+b.votes,0);
  const maxVotes = Math.max(...rows.map(r=>r.votes), 1);

  rows.forEach(r => {
    const percent = total ? ((r.votes / total) * 100).toFixed(1) : 0;
    const party = parties.find(p => p.id === r.id) || {};

    const col = document.createElement("div");
    col.className = "partyCol";

    col.innerHTML = `
      <div>${percent}%</div>
      <div>${r.votes}</div>
      <div class="bar" style="height:${(r.votes / maxVotes * 100)}%;background:${getColorByPartyId(r.id)}"></div>
      <div>${party.short || "-"}</div>
      <img class="logo" src="${party.logo || ''}" onerror="this.onerror=null;this.src='placeholder.png';">
      <div>${r.id}</div>
    `;

    wrap.appendChild(col);
  });
}
</script>

</body>
</html>
