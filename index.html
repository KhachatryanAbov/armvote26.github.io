<!DOCTYPE html>
<html>
<head>
  <title>Votes Admin</title>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h2>Votes</h2>

<canvas id="barChart"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>

// ===== PARTIES (SHORT NAMES) =====
const parties = [
  { id:1, short:"ՔՊ", logo:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Logo_of_the_Civil_Contract_%28Armenia%29.svg"},
  { id:2, short:"ԲՀԿ", logo:"https://www.bhk.am/sites/default/files/BHK%20logo_0.png"},
  { id:3, short:"ՀՇ", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/MPALogo.jpg"},
  { id:4, short:"Դեմ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3l-T4PLG67uEgDtSN73j8S8OOR81nuI27Fg&s"},
  { id:5, short:"ՈւժեղՀայաստան", logo:"https://armenpress.am/resized/480/storage/images/articles/2026/04/30/tThfqF3hyVoRBi6C0s2TpfC9jHRMf5a1tRduytwl.webp"},
  { id:6, short:"ԺՀԿ", logo:"https://upload.wikimedia.org/wikipedia/commons/0/0c/DCP.2021.jpg"},
  { id:7, short:"Միասն.", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRlfhsudHo-rvXsIK_gnczbjm464TiS-iYHqQ&s"},
  { id:8, short:"ԼՀԿ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlGBhk1R3JgVw1-ksI4tcrQAEdYgCOGflGJw&s"},
  { id:9, short:"ԱԺԲ", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/%D4%B1%D5%A6%D5%A3%D5%A1%D5%B5%D5%AB%D5%B6_%D5%A2%D6%87%D5%A5%D5%BC.jpg"},
  { id:10, short:"Հայաստան", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Armenia_Alliance_logo.svg"},
  { id:11, short:"Քրիստոնեա", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8Tyy5XNKDF92eSXtyU6Jrk3ORjBJcLMmv3g&s"},
  { id:12, short:"ՀԱԿ", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5b/Anc_logo.PNG"},
  { id:13, short:"ՆորՈւժ", logo:"https://upload.wikimedia.org/wikipedia/commons/4/4a/New_Power_%28Armenia%29_logo.jpg"},
  { id:14, short:"Հանրապետություն", logo:"https://upload.wikimedia.org/wikipedia/commons/0/0e/Hanrapetutyun_Party_logo.png"},
  { id:15, short:"Ալյանս", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Alliance_Party.png"},
  { id:16, short:"Ռեֆորմ", logo:"https://factor.am/wp-content/uploads/2018/09/37500296_1767189420023459_7266293957057839104_n.jpg"},
  { id:17, short:"ԴՕԿ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSORF_prff2D5EBVVKLp1j16k_huqGKP1jq0Q&s"},
  { id:18, short:"Քոչարի", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLggbEGwu3AVgQn6Cx4xXmf4UYur61rayTeA&s"},
  { id:19, short:"Հանուն", logo:"https://upload.wikimedia.org/wikipedia/commons/1/1f/%D5%80%D5%A1%D5%B6%D5%B8%D6%82%D5%B6.png"}
];

// ===== LOGO CACHE =====
const logoCache = {};

function getLogo(id){
  if (logoCache[id]) return logoCache[id];

  const party = parties.find(p=>p.id==id);
  const img = new Image();
  img.crossOrigin = "anonymous";
  img.src = party?.logo || "";

  img.onerror = () => {
    img.src = "https://via.placeholder.com/100?text=?";
  };

  logoCache[id] = img;
  return img;
}

// ===== LOGO PLUGIN =====
const logoPlugin = {
  id: 'logoPlugin',
  afterDraw(chart) {
    const { ctx, chartArea, scales } = chart;
    const xScale = scales.x;

    chart.data.ids.forEach((id, i) => {
      const img = getLogo(id);
      if (!img.complete) return;

      const x = xScale.getPixelForValue(i);
      const size = 30; // logo size (you can increase to 40–50)

      const y = chartArea.bottom + 30; // BELOW labels

      ctx.drawImage(img, x - size / 2, y, size, size);
    });
  }
};

// ===== FIREBASE =====
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "parlo1-28056.firebaseapp.com",
  databaseURL: "https://parlo1-28056-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let barChart;

// ===== LOAD DATA =====
db.ref("votes/3333").on("value", snap=>{
  const data = snap.val() || {};

  const totals = new Array(20).fill(0);

  for (let r in data){
    for (let s in data[r]){
      const p = data[r][s].parties || {};
      for (let i in p) totals[i]+=p[i];
    }
  }

  render(totals);
});

// ===== RENDER =====
function render(totals){

  let rows = [];
  for(let i=1;i<=19;i++){
    rows.push({id:i, votes:totals[i]});
  }

  rows.sort((a,b)=>b.votes-a.votes);

  const labels = rows.map(r=>{
    const p = parties.find(x=>x.id===r.id);
    return r.id + " " + (p?.short || "");
  });

  const ids = rows.map(r=>r.id);
  const values = rows.map(r=>r.votes);

  if (barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type:'bar',
    data:{
      labels,
      ids,
      datasets:[{ data: values }]
    },
    options:{
      layout:{  padding:{
      top:120,
      bottom:80   // 👈 ADD THIS
    }},
      plugins:{
        legend:{display:false},
        datalabels:{
          anchor:'end',
          align:'top',
          offset:50,
          font:{weight:'bold'},
          formatter:(v,ctx)=>{
            const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
            const percent = total ? ((v/total)*100).toFixed(1):0;
            return v+" ("+percent+"%)";
          }
        }
      }
    },
    plugins:[ChartDataLabels, logoPlugin]
  });
}

</script>

</body>
</html>
