<!DOCTYPE html>
<html>
<head>
  <title>Votes Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; }
    button { margin: 5px; padding: 8px 12px; cursor: pointer; }
    #grid button { width: 80px; margin: 4px; }
    .hidden { display: none; }
  </style>
</head>
<body>

<h2 id="title">Votes</h2>

<button onclick="setMode('ALL')">ALL</button>
<button onclick="setMode('REGION')">REGION</button>
<button onclick="setMode('STATION')">STATION</button>
<button onclick="setMode('TOP')">TOP</button>

<br><br>

<button onclick="setDisplay('LIST')">LIST</button>
<button onclick="setDisplay('CHART')">BAR</button>

<hr>

<div id="grid"></div>
<div id="list"></div>
<canvas id="barChart" class="hidden"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "parlo1-28056.firebaseapp.com",
  databaseURL: "https://parlo1-28056-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const VERSION = "3333";

// ===== STATE =====
let display = "LIST";
let selectedRegion = null;
let selectedStation = null;
let selectedTopN = null;
let cache = null;

let currentScope = { type: "ALL" };
let dbRef = null;

// ===== COLORS =====
function getColors(count) {
  const base = ["#FFA726","#66BB6A","#42A5F5","#AB47BC","#FF7043","#26C6DA","#D4E157","#8D6E63","#EC407A","#78909C"];
  return Array.from({length: count}, (_, i) => base[i % base.length]);
}

// ===== LIVE UPDATES =====
function startLiveUpdates() {
  dbRef = db.ref("votes/" + VERSION);

  dbRef.on("value", (snapshot) => {
    cache = snapshot.val() || {};
    console.log("🔥 Live update");
    refreshCurrentView();
  });
}

// ===== MODE =====
function setMode(m) {
  selectedRegion = null;
  selectedStation = null;

  if (m === "ALL") loadAll();
  if (m === "REGION") showRegions(false);
  if (m === "STATION") showRegions(true);
  if (m === "TOP") showTopPicker();
}

// ===== DISPLAY =====
function setDisplay(d) {
  display = d;
  document.getElementById("list").classList.add("hidden");
  document.getElementById("barChart").classList.add("hidden");

  if (d === "LIST") document.getElementById("list").classList.remove("hidden");
  if (d === "CHART") document.getElementById("barChart").classList.remove("hidden");
}

// ===== REFRESH (LIKE ANDROID) =====
function refreshCurrentView() {
  if (!cache) return;

  if (currentScope.type === "ALL") calculateAll();
  if (currentScope.type === "REGION") calculateRegion(currentScope.region);
  if (currentScope.type === "STATION") calculateStation(currentScope.region, currentScope.station);
}

// ===== ALL =====
function loadAll() {
  document.getElementById("title").innerText = "ALL";
  currentScope = { type: "ALL" };
  calculateAll();
}

function calculateAll() {
  const totals = new Array(20).fill(0);

  for (let r in cache) {
    for (let s in cache[r]) {
      const parties = cache[r][s].parties || {};
      for (let p in parties) totals[p] += parties[p];
    }
  }

  renderAll(totals);
}

// ===== REGION =====
function showRegions(forStation) {
  document.getElementById("title").innerText = "Select Region";
  renderGrid(Object.keys(cache), r => {
    selectedRegion = r;
    if (forStation) showStations(r);
    else loadRegion(r);
  });
}

function loadRegion(region) {
  document.getElementById("title").innerText = "Region " + region;
  currentScope = { type: "REGION", region };
  calculateRegion(region);
}

function calculateRegion(region) {
  const totals = new Array(20).fill(0);
  const data = cache[region] || {};

  for (let s in data) {
    const parties = data[s].parties || {};
    for (let p in parties) totals[p] += parties[p];
  }

  renderAll(totals);
}

// ===== STATION =====
function showStations(region) {
  document.getElementById("title").innerText = "Select Station";
  renderGrid(Object.keys(cache[region]), s => {
    selectedStation = s;
    loadStation(region, s);
  });
}

function loadStation(region, station) {
  document.getElementById("title").innerText = "Station " + station;
  currentScope = { type: "STATION", region, station };
  calculateStation(region, station);
}

function calculateStation(region, station) {
  const totals = new Array(20).fill(0);
  const parties = cache?.[region]?.[station]?.parties || {};

  for (let p in parties) totals[p] = parties[p];

  renderAll(totals);
}

// ===== TOP =====
function showTopPicker() {
  document.getElementById("title").innerText = "Select Top N";
  renderGrid(Array.from({length:19},(_,i)=>i+1), n => {
    selectedTopN = n;
    refreshCurrentView();
  });
}

// ===== GRID =====
function renderGrid(items, onClick) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  items.forEach(i => {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => onClick(i);
    grid.appendChild(btn);
  });
}

// ===== RENDER =====
function renderAll(totals) {
  let rows = [];

  for (let i = 1; i <= 19; i++) {
    rows.push({ id: i, votes: totals[i] });
  }

  rows.sort((a,b)=>b.votes-a.votes);
  if (selectedTopN) rows = rows.slice(0, selectedTopN);

  renderList(rows);
  renderChart(rows);
}

  function getColorByPartyId(id) {
  const palette = [
    "#FFA726", "#66BB6A", "#42A5F5", "#AB47BC",
    "#FF7043", "#26C6DA", "#D4E157", "#8D6E63",
    "#EC407A", "#78909C"
  ];

  return palette[(id - 1) % palette.length];
}

// ===== LIST =====
function renderList(rows) {
  const list = document.getElementById("list");
  list.innerHTML = "";
  rows.forEach(r => {
    const div = document.createElement("div");
    div.innerText = `Party ${r.id}: ${r.votes}`;
    list.appendChild(div);
  });
}

// ===== CHART =====
let barChart;

function renderChart(rows) {
  const labels = rows.map(r => r.id);
  const data = rows.map(r => r.votes);
  const colors = rows.map(r => getColorByPartyId(r.id));

  if (barChart) barChart.destroy();

  barChart = new Chart(document.getElementById("barChart"), {
    type: 'bar',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: colors
      }]
    },
    options: {
      plugins: {
        legend: { display: false },

        // 👇 THIS is the important part
        datalabels: {
          anchor: 'end',
          align: 'top',
          color: '#111',
          font: {
            weight: 'bold',
            size: 12
          },
          formatter: function(value, ctx) {
  const total = ctx.chart.data.datasets[0].data.reduce((a,b)=>a+b,0);
  const percent = total ? ((value / total) * 100).toFixed(1) : 0;
  return value + " (" + percent + "%)";
}
        }
      }
    },
    plugins: [ChartDataLabels] // 👈 enable plugin
  });
}

// ===== START =====
startLiveUpdates();
loadAll();

</script>

</body>
</html>
