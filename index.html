<!DOCTYPE html>
<html>
<head>
  <title>Votes Admin</title>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
    }

    button {
      margin: 5px;
      padding: 8px 12px;
      cursor: pointer;
    }

    #grid button {
      width: 80px;
      margin: 4px;
    }

    .hidden {
      display: none;
    }

    /* ===== CUSTOM CHART ===== */
    #chartWrap {
      display: flex;
      align-items: flex-end;
      gap: 12px;
      height: 320px;
      margin-top: 20px;
    }

    .partyCol {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 70px;
      font-size: 12px;
    }

    .bar {
      width: 100%;
      border-radius: 6px 6px 0 0;
      margin: 5px 0;
      transition: height 0.3s ease;
    }

    .logo {
      width: 40px;
      height: 40px;
      object-fit: contain;
      margin-top: 4px;
    }
  </style>
</head>

<body>

<h2 id="title">Votes</h2>

<button onclick="setMode('ALL')">ALL</button>
<button onclick="setMode('TOP')">TOP</button>

<br><br>

<button onclick="setDisplay('LIST')">LIST</button>
<button onclick="setDisplay('CHART')">CHART</button>

<hr>

<div id="grid"></div>
<div id="list"></div>
<div id="chartWrap" class="hidden"></div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSy...",
  authDomain: "parlo1-28056.firebaseapp.com",
  databaseURL: "https://parlo1-28056-default-rtdb.europe-west1.firebasedatabase.app",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const VERSION = "3333";

// ===== PARTIES =====
const parties = [
  { id:1, short:"ՔՊ", logo:"https://upload.wikimedia.org/wikipedia/commons/6/6a/Logo_of_the_Civil_Contract_%28Armenia%29.svg"},
  { id:2, short:"ԲՀԿ", logo:"https://www.bhk.am/sites/default/files/BHK%20logo_0.png"},
  { id:3, short:"ՀՇ", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3f/MPALogo.jpg"},
  { id:4, short:"Դեմ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ3l-T4PLG67uEgDtSN73j8S8OOR81nuI27Fg&s"},
  { id:5, short:"ՈւժեղՀայաստան", logo:"https://armenpress.am/resized/480/storage/images/articles/2026/04/30/tThfqF3hyVoRBi6C0s2TpfC9jHRMf5a1tRduytwl.webp"},
  { id:6, short:"ԺՀԿ", logo:"https://upload.wikimedia.org/wikipedia/commons/0/0c/DCP.2021.jpg"},
  { id:7, short:"Միասն.", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcRlfhsudHo-rvXsIK_gnczbjm464TiS-iYHqQ&s"},
  { id:8, short:"ԼՀԿ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTlGBhk1R3JgVw1-ksI4tcrQAEdYgCOGflGJw&s"},
  { id:9, short:"ԱԺԲ", logo:"https://upload.wikimedia.org/wikipedia/commons/2/2b/%D4%B1%D5%A6%D5%A3%D5%A1%D5%B5%D5%AB%D5%B6_%D5%A2%D6%87%D5%A5%D5%BC.jpg"},
  { id:10, short:"Հայաստան", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5f/Armenia_Alliance_logo.svg"},
  { id:11, short:"Քրիստոնեա", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT8Tyy5XNKDF92eSXtyU6Jrk3ORjBJcLMmv3g&s"},
  { id:12, short:"ՀԱԿ", logo:"https://upload.wikimedia.org/wikipedia/commons/5/5b/Anc_logo.PNG"},
  { id:13, short:"ՆորՈւժ", logo:"https://upload.wikimedia.org/wikipedia/commons/4/4a/New_Power_%28Armenia%29_logo.jpg"},
  { id:14, short:"Հանրապետություն", logo:"https://upload.wikimedia.org/wikipedia/commons/0/0e/Hanrapetutyun_Party_logo.png"},
  { id:15, short:"Ալյանս", logo:"https://upload.wikimedia.org/wikipedia/commons/3/3e/Alliance_Party.png"},
  { id:16, short:"Ռեֆորմ", logo:"https://factor.am/wp-content/uploads/2018/09/37500296_1767189420023459_7266293957057839104_n.jpg"},
  { id:17, short:"ԴՕԿ", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSORF_prff2D5EBVVKLp1j16k_huqGKP1jq0Q&s"},
  { id:18, short:"Քոչարի", logo:"https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTLggbEGwu3AVgQn6Cx4xXmf4UYur61rayTeA&s"},
  { id:19, short:"Հանուն", logo:"https://upload.wikimedia.org/wikipedia/commons/1/1f/%D5%80%D5%A1%D5%B6%D5%B8%D6%82%D5%B6.png"}
];

// ===== STATE =====
let display = "LIST";
let selectedTopN = null;
let cache = null;

// ===== COLORS =====
function getColorByPartyId(id) {
  const palette = ["#FFA726","#66BB6A","#42A5F5","#AB47BC","#FF7043","#26C6DA","#D4E157","#8D6E63","#EC407A","#78909C"];
  return palette[(id - 1) % palette.length];
}

// ===== LIVE =====
db.ref("votes/" + VERSION).on("value", (snap) => {
  cache = snap.val() || {};
  calculateAll();
});

// ===== DISPLAY =====
function setDisplay(d) {
  display = d;
  document.getElementById("list").classList.add("hidden");
  document.getElementById("chartWrap").classList.add("hidden");

  if (d === "LIST") document.getElementById("list").classList.remove("hidden");
  if (d === "CHART") document.getElementById("chartWrap").classList.remove("hidden");
}

// ===== DATA =====
function calculateAll() {
  if (!cache) return;

  const totals = new Array(20).fill(0);

  for (let r in cache) {
    for (let s in cache[r]) {
      const p = cache[r][s].parties || {};
      for (let i in p) totals[i] += p[i];
    }
  }

  renderAll(totals);
}

// ===== TOP =====
function setMode(m) {
  if (m === "TOP") {
    renderGrid(Array.from({length:19},(_,i)=>i+1), n => {
      selectedTopN = n;
      calculateAll();
    });
  }
}

// ===== GRID =====
function renderGrid(items, onClick) {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";

  items.forEach(i => {
    const btn = document.createElement("button");
    btn.innerText = i;
    btn.onclick = () => onClick(i);
    grid.appendChild(btn);
  });
}

// ===== RENDER =====
function renderAll(totals) {
  let rows = [];

  for (let i = 1; i <= 19; i++) {
    rows.push({ id: i, votes: totals[i] });
  }

  rows.sort((a,b)=>b.votes-a.votes);

  if (selectedTopN) rows = rows.slice(0, selectedTopN);

  renderList(rows);
  renderChart(rows);
}

// ===== LIST =====
function renderList(rows) {
  const list = document.getElementById("list");
  list.innerHTML = "";

  rows.forEach(r => {
    const div = document.createElement("div");
    div.innerText = `Party ${r.id}: ${r.votes}`;
    list.appendChild(div);
  });
}

// ===== CUSTOM CHART =====
function renderChart(rows) {
  const wrap = document.getElementById("chartWrap");
  wrap.innerHTML = "";

  const total = rows.reduce((a,b)=>a+b.votes,0);
  const maxVotes = Math.max(...rows.map(r=>r.votes), 1);

  rows.forEach(r => {
    const percent = total ? ((r.votes / total) * 100).toFixed(1) : 0;
    const party = parties.find(p => p.id === r.id) || {};

    const col = document.createElement("div");
    col.className = "partyCol";

    col.innerHTML = `
      <div>${percent}%</div>
      <div>${r.votes}</div>
      <div class="bar" style="height:${(r.votes / maxVotes * 150)}px;background:${getColorByPartyId(r.id)}"></div>
      <div>${party.short || "-"}</div>
      <img class="logo" src="${party.logo || ''}" onerror="this.src='https://via.placeholder.com/40?text=?'">
      <div>${r.id}</div>
    `;

    wrap.appendChild(col);
  });
}
</script>

</body>
</html>
